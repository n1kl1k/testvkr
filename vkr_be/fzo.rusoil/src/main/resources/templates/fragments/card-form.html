<html xmlns:th="http://www.thymeleaf.org">
<div th:fragment="form">
    <form id="cardForm" th:action="@{/api/cards/save}" th:object="${cardCommand}" method="post">
        <input type="hidden" th:field="*{cardId}">
        <div class="modal-header">
            <h5 class="modal-title">Карточка</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
            <!-- Основные поля -->
            <div class="row">
                <div class="col-md-6">
                    <label>Название</label>
                    <input class="form-control" th:field="*{title}">
                </div>
                <div class="col-md-6">
                    <label>Профиль</label>
                    <input class="form-control" th:field="*{profile}">
                </div>
                <div class="col-md-6">
                    <label>Выпускающая кафедра</label>
                    <input class="form-control" th:field="*{graduating}">
                </div>
                <div class="col-md-6">
                    <label>Контакты</label>
                    <input class="form-control" th:field="*{contacts}">
                </div>
                <div class="col-12">
                    <label>Длительность</label>
                    <input class="form-control" th:field="*{duration}">
                </div>
                <div class="mb-3">
                    <label>Картинка</label>
                    <input type="file" id="imageInput" class="form-control">
                </div>
                <img id="previewImage" style="max-width:200px; margin-top:10px; display:none;">
            </div>
            <hr>
            <h5>Дополнительная информация</h5>
            <div class="mb-2">
                <label>Заголовок</label>
                <input class="form-control" th:field="*{additionalTitle}">
            </div>
            <div class="mb-2">
                <label>Инфо</label>
                <textarea class="form-control" th:field="*{additionalInfo}"></textarea>
            </div>

            <!-- Активности -->
            <div class="mb-2">
                <label>Активности</label>
                <div class="activities-container">
                    <div th:each="act : *{activities}" class="input-group mb-2">
                        <input type="text" name="activities" th:value="${act}" class="form-control" placeholder="Активность">
                        <button type="button" class="btn btn-danger remove-row">Удалить</button>
                    </div>
                </div>
                <button type="button" class="btn btn-sm btn-secondary add-activity">+ Добавить активность</button>
            </div>

            <!-- Партнёры -->
            <div class="mb-2">
                <label>Партнёры</label>
                <div class="partners-container">
                    <div th:each="partner : *{partners}" class="input-group mb-2">
                        <input type="text" name="partners" th:value="${partner}" class="form-control" placeholder="Партнёр">
                        <button type="button" class="btn btn-danger remove-row">Удалить</button>
                    </div>
                </div>
                <button type="button" class="btn btn-sm btn-secondary add-partner">+ Добавить партнёра</button>
            </div>

            <!-- Требования (requirements) -->
            <div class="mb-2">
                <label>Требования (база и СПО)</label>
                <div class="requirements-container">
                    <div th:each="req : *{requirements}" class="row mb-2 g-2">
                        <div class="col-sm-5">
                            <input type="text" name="requirementsBasePlan" th:value="${req.basePlan}" class="form-control" placeholder="Базовый план">
                        </div>
                        <div class="col-sm-5">
                            <input type="text" name="requirementsSpoPlan" th:value="${req.spoPlan}" class="form-control" placeholder="СПО план">
                        </div>
                        <div class="col-sm-2">
                            <button type="button" class="btn btn-danger remove-row w-100">Удалить</button>
                        </div>
                    </div>
                </div>
                <button type="button" class="btn btn-sm btn-secondary add-requirement">+ Добавить требование</button>
            </div>

            <!-- Планы (планы приёма) -->
            <div class="mb-2">
                <label>План приёма (бюджет, платно, баллы)</label>
                <div class="plans-container">
                    <div th:each="plan : *{plans}" class="row mb-2 g-2">
                        <div class="col-sm-3">
                            <input type="number" name="planBudget" th:value="${plan.budget}" class="form-control" placeholder="Бюджет">
                        </div>
                        <div class="col-sm-3">
                            <input type="number" name="planPaid" th:value="${plan.paid}" class="form-control" placeholder="Платно">
                        </div>
                        <div class="col-sm-4">
                            <input type="text" name="planScore" th:value="${plan.score}" class="form-control" placeholder="Баллы">
                        </div>
                        <div class="col-sm-2">
                            <button type="button" class="btn btn-danger remove-row w-100">Удалить</button>
                        </div>
                    </div>
                </div>
                <button type="button" class="btn btn-sm btn-secondary add-plan">+ Добавить план</button>
            </div>

        </div>
        <div class="modal-footer">
            <button type="submit" class="btn btn-primary">Сохранить</button>
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
        </div>
    </form>
</div>
</html>

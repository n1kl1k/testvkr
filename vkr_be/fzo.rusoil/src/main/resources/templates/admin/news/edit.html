<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Редактировать новость</title>

    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

    <style>
        body {
            background: #446693;
            font-family: sans-serif;
            padding: 40px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 800px;
            margin: auto;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        .editor-label {
            font-weight: bold;
            margin-bottom: 5px;
            display: block;
        }

        #editorShort {
            height: 150px;
            margin-bottom: 20px;
        }

        #editorFull {
            height: 200px;
            margin-bottom: 20px;
        }

        button {
            padding: 10px 20px;
            background: #1E3A5F;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Редактирование новости</h2>

    <form th:action="@{/admin/news/update/{id}(id=${news.id})}"
          method="post"
          onsubmit="prepareData()">

        <input type="hidden" name="_csrf" th:value="${_csrf.token}">

        <input type="text" name="title" th:value="${news.title}" required>

        <!-- Скрытое поле для краткого текста (HTML из редактора) -->
        <input type="hidden" name="shortText" id="shortTextHidden">

        <label class="editor-label">Краткий текст (с форматированием):</label>
        <!-- Передаём HTML из БД через data-атрибут -->
        <div id="editorShort" th:data-shorttext="${news.shortText}"></div>

        <!-- Скрытое поле для полного текста -->
        <input type="hidden" name="fullText" id="fullTextHidden">

        <label class="editor-label">Полный текст (с форматированием):</label>
        <div id="editorFull" th:data-fulltext="${news.fullText}"></div>

        <button type="submit">💾 Обновить</button>
    </form>
</div>

<script>
    // Получаем контейнеры редакторов
    const editorShortDiv = document.getElementById('editorShort');
    const editorFullDiv = document.getElementById('editorFull');

    // Извлекаем начальные HTML из data-атрибутов
    const initialShortHtml = editorShortDiv.getAttribute('data-shorttext') || '';
    const initialFullHtml = editorFullDiv.getAttribute('data-fulltext') || '';

    // Инициализация редактора для краткого текста
    const shortQuill = new Quill(editorShortDiv, {
        theme: 'snow',
        modules: {
            toolbar: [
                [{ header: [1, 2, false] }],
                ['bold', 'italic', 'underline'],
                [{ color: [] }],
                [{ list: 'ordered'}, { list: 'bullet' }],
                ['link']
            ]
        }
    });

    // Инициализация редактора для полного текста
    const fullQuill = new Quill(editorFullDiv, {
        theme: 'snow',
        modules: {
            toolbar: [
                [{ header: [1, 2, false] }],
                ['bold', 'italic', 'underline'],
                [{ color: [] }],
                [{ list: 'ordered'}, { list: 'bullet' }],
                ['link']
            ]
        }
    });

    // Вставляем сохранённый HTML в редакторы (отображаем форматирование)
    shortQuill.root.innerHTML = initialShortHtml;
    fullQuill.root.innerHTML = initialFullHtml;

    // Перед отправкой формы сохраняем текущий HTML редакторов в скрытые поля
    function prepareData() {
        document.getElementById('shortTextHidden').value = shortQuill.root.innerHTML;
        document.getElementById('fullTextHidden').value = fullQuill.root.innerHTML;
    }
</script>

</body>
</html>

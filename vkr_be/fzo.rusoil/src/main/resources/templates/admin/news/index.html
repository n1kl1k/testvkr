<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Админ – Новости</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1E3A5F, #2c4a76);
            margin: 0;
            color: #333;
        }

        /* контейнер */
        .container {
            max-width: 1200px;
            margin: 40px auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        /* header */
        .top-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-add {
            background: #4CAF50;
            color: white;
        }

        .btn-logout {
            background: #f44336;
            color: white;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        /* таблица */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
    background: #1E3A5F;
    color: white;
    padding: 15px;
    text-align: center; /* явно задаём центрирование */
}

td {
    padding: 12px;
    border-bottom: 1px solid #eee;
    text-align: center; /* значения – под заголовками */
}

        tr:hover {
            background: #f5f8ff;
        }

        /* кнопки действий */
        .action a {
            margin-right: 10px;
            text-decoration: none;
            font-weight: 600;
        }

        .edit { color: #2196F3; }
        .delete { color: #f44336; }
    </style>

</head>

<body>

<div class="container">

    <h1>📢 Новости</h1>

    <div class="top-bar">
        <a href="/admin/news/add"><button class="btn btn-add">➕ Добавить</button></a>
        <a href="/logout"><button class="btn btn-logout">⛔ Выйти</button></a>
    </div>

    <table>
        <tr>
            <th>ID</th>
            <th>Заголовок</th>
            <th>Дата</th>
            <th>Действия</th>
        </tr>

        <tr th:each="n : ${list}">
            <td th:text="${n.id}"></td>
            <td th:text="${n.title}"></td>
            <td th:text="${n.date}"></td>
            <td class="action">
                <a th:href="@{'/admin/news/edit/' + ${n.id}}" class="edit">✏</a>
                <a th:href="@{'/admin/delete/' + ${n.id}}" class="delete">🗑</a>
            </td>
        </tr>
    </table>

</div>

</body>
</html>

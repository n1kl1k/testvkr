<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="admin/layout :: *">

<th:block th:with="title='Карточки'">

<div th:fragment="content">

<!-- head переносим сюда -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<style>
    .card-hover:hover {
        transform: translateY(-5px);
        transition: 0.3s;
        box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        cursor: pointer;
    }
    .card { border-radius: 20px; overflow: hidden; }
    .badge-custom {
        background-color: #0d6efd;
        color: white;
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 12px;
    }
    .btn-edit {
        background-color: #ffc107;
        border: none;
    }
    .btn-edit:hover {
        background-color: #e0a800;
    }
    .modal-body {
        max-height: 70vh;
        overflow-y: auto;
    }
</style>

<!-- ТВОЙ HTML БЕЗ ИЗМЕНЕНИЙ -->
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>📚 Образовательные программы</h1>
        <button type="button" class="btn btn-primary" id="openCreateModal">➕ Создать карточку</button>
    </div>
    <div class="row" id="cardsContainer"></div>
</div>

<!-- МОДАЛКИ БЕЗ ИЗМЕНЕНИЙ -->
<div class="modal fade" id="detailsModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="detailsModalTitle"></h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="detailsModalBody"></div>
        </div>
    </div>
</div>

<div class="modal fade" id="formModal" tabindex="-1" data-bs-backdrop="static">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
        <div class="modal-content" id="formModalContent"></div>
    </div>
</div>

<!-- 🔥 ВЕСЬ ТВОЙ JS БЕЗ ИЗМЕНЕНИЙ -->
<script>
    const apiBase = '/api/cards';
    let currentEditId = null;

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    function showDetails(cardId) {
        fetch(`${apiBase}/${cardId}/details`)
            .then(res => res.ok ? res.json() : Promise.reject('Ошибка загрузки деталей'))
            .then(data => {
                document.getElementById('detailsModalTitle').innerText = data.title || '';
                let html = `
                    <p><strong>Профиль:</strong> ${escapeHtml(data.profile)}</p>
                    <p><strong>Выпускающая кафедра:</strong> ${escapeHtml(data.graduating)}</p>
                    <p><strong>Контакты:</strong> ${escapeHtml(data.contacts)}</p>
                    <p><strong>Срок обучения:</strong> ${escapeHtml(data.duration)}</p>
                    <hr>
                    <h6>📌 Дополнительная информация</h6>
                    <p><strong>${escapeHtml(data.additionalTitle || '')}</strong><br>${escapeHtml(data.additionalInfo || '')}</p>
                `;
                if (data.activities?.length) {
                    html += `<h6>🎯 Виды деятельности:</h6><ul>${data.activities.map(a => `<li>${escapeHtml(a)}</li>`).join('')}</ul>`;
                }
                if (data.partners?.length) {
                    html += `<h6>🤝 Партнёры:</h6><ul>${data.partners.map(p => `<li>${escapeHtml(p)}</li>`).join('')}</ul>`;
                }
                if (data.requirements?.length) {
                    html += `<h6>📋 Требования:</h6><ul>${data.requirements.map(r => `<li>База: ${escapeHtml(r.basePlan || '—')}, СПО: ${escapeHtml(r.spoPlan || '—')}</li>`).join('')}</ul>`;
                }
                if (data.plans?.length) {
                    html += `<h6>💰 План приёма:</h6><ul>${data.plans.map(p => `<li>Бюджет: ${p.budget || '—'}, Платно: ${p.paid || '—'}, Баллы: ${p.score || '—'}</li>`).join('')}</ul>`;
                }
                document.getElementById('detailsModalBody').innerHTML = html;
                new bootstrap.Modal(document.getElementById('detailsModal')).show();
            })
            .catch(err => alert('Не удалось загрузить подробности: ' + err));
    }

    function loadCardsList() {
        fetch(apiBase)
            .then(res => res.ok ? res.json() : Promise.reject('Ошибка загрузки списка'))
            .then(cards => {
                const container = document.getElementById('cardsContainer');
                container.innerHTML = '';

                cards.forEach(card => {
                    const col = document.createElement('div');
                    col.className = 'col-md-6 col-lg-4 mb-4';
                    col.innerHTML = `
                        <div class="card h-100">
                            <div class="card-body">
                                <h5 class="card-title">${escapeHtml(card.title)}</h5>
                                <p><strong>Профиль:</strong> ${escapeHtml(card.profile)}</p>
                                <p><small>⏱ ${escapeHtml(card.duration)}</small></p>
                                <div class="d-flex justify-content-between mt-3">
                                    <button class="btn btn-sm btn-outline-primary" onclick="showDetails(${card.cardId})">Подробнее</button>
                                </div>
                            </div>
                        </div>
                    `;
                    container.appendChild(col);
                });
            });
    }

    document.getElementById('openCreateModal').onclick = () => {
        loadForm('/admin/create-form', 'Создание карточки');
    };

    loadCardsList();
</script>

</div>
</th:block>
</html>

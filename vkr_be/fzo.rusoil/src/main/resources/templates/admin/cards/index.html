<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<th:block th:with="title='Карточки'">

<div th:fragment="content">

<!-- head переносим сюда -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<style>
    .card-hover:hover {
        transform: translateY(-5px);
        transition: 0.3s;
        box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        cursor: pointer;
    }
    .card { border-radius: 20px; overflow: hidden; }
    .badge-custom {
        background-color: #0d6efd;
        color: white;
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 12px;
    }
    .btn-edit {
        background-color: #ffc107;
        border: none;
    }
    .btn-edit:hover {
        background-color: #e0a800;
    }
    .modal-body {
        max-height: 70vh;
        overflow-y: auto;
    }
</style>

<!-- ТВОЙ HTML БЕЗ ИЗМЕНЕНИЙ -->
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>📚 Образовательные программы</h1>
        <button type="button" class="btn btn-primary" id="openCreateModal">➕ Создать карточку</button>
    </div>
    <div class="row" id="cardsContainer"></div>
</div>

<!-- МОДАЛКИ БЕЗ ИЗМЕНЕНИЙ -->
<div class="modal fade" id="detailsModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="detailsModalTitle"></h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="detailsModalBody"></div>
        </div>
    </div>
</div>

<div class="modal fade" id="formModal" tabindex="-1" data-bs-backdrop="static">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
        <div class="modal-content" id="formModalContent"></div>
    </div>
</div>

<script>
const apiBase = '/api/cards';

/* ---------------- ЗАГРУЗКА ФОРМЫ ---------------- */
function loadForm(url) {
    fetch(url)
        .then(res => res.text())
        .then(html => {
            document.getElementById('formModalContent').innerHTML = html;

            const modal = new bootstrap.Modal(document.getElementById('formModal'));
            modal.show();
        })
        .catch(() => alert('Ошибка загрузки формы'));
}

/* ---------------- ДОБАВЛЕНИЕ ПОЛЕЙ ---------------- */
function addField(containerId) {
    const div = document.createElement('div');
    div.className = "input-group mb-2";

    div.innerHTML = `
        <input class="form-control">
        <button type="button" class="btn btn-danger">✖</button>
    `;

    div.querySelector('button').onclick = () => div.remove();

    document.getElementById(containerId).appendChild(div);
}

/* ---------------- СБОР СПИСКОВ ---------------- */
function getList(containerId) {
    const inputs = document.querySelectorAll(`#${containerId} input`);
    return Array.from(inputs)
        .map(i => i.value.trim())
        .filter(v => v.length > 0);
}

/* ---------------- ОТПРАВКА ФОРМЫ ---------------- */
document.getElementById('cardForm').onsubmit = function (e) {
    e.preventDefault();

    const form = e.target;

    const data = {
        cardId: form.querySelector('[name="cardId"]').value || null,
        title: form.querySelector('[name="title"]').value,
        profile: form.querySelector('[name="profile"]').value,
        graduating: form.querySelector('[name="graduating"]').value,
        contacts: form.querySelector('[name="contacts"]').value,
        duration: form.querySelector('[name="duration"]').value,
        additionalTitle: form.querySelector('[name="additionalTitle"]').value,
        additionalInfo: form.querySelector('[name="additionalInfo"]').value,

        activities: [...form.querySelectorAll('[name="activities"]')]
            .map(i => i.value)
            .filter(v => v),

        partners: [...form.querySelectorAll('[name="partners"]')]
            .map(i => i.value)
            .filter(v => v),

        requirements: [...form.querySelectorAll('.requirements-container .row')]
            .map(row => ({
                basePlan: row.querySelector('[name="requirementsBasePlan"]').value,
                spoPlan: row.querySelector('[name="requirementsSpoPlan"]').value
            })),

        plans: [...form.querySelectorAll('.plans-container .row')]
            .map(row => ({
                budget: row.querySelector('[name="planBudget"]').value,
                paid: row.querySelector('[name="planPaid"]').value,
                score: row.querySelector('[name="planScore"]').value
            }))
    };

    fetch('/api/cards/save', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify(data)
    })
    .then(res => {
        if (!res.ok) throw new Error();

        alert('Сохранено ✅');

        bootstrap.Modal
            .getInstance(document.getElementById('formModal'))
            .hide();

        loadCardsList();
    })
    .catch(err => {
        console.error(err);
        alert('Ошибка сохранения');
    });
};

/* ---------------- ЗАГРУЗКА СПИСКА КАРТОЧЕК ---------------- */
function loadCardsList() {
    fetch(apiBase)
        .then(res => res.ok ? res.json() : Promise.reject())
        .then(cards => {
            const container = document.getElementById('cardsContainer');
            container.innerHTML = '';

            cards.forEach(card => {
                const col = document.createElement('div');
                col.className = 'col-md-6 col-lg-4 mb-4';

                col.innerHTML = `
                    <div class="card h-100 card-hover">
                        <div class="card-body">
                            <h5 class="card-title">${escapeHtml(card.title)}</h5>
                            <p><strong>Профиль:</strong> ${escapeHtml(card.profile)}</p>
                            <p><small>⏱ ${escapeHtml(card.duration)}</small></p>

                            <div class="d-flex justify-content-between mt-3">
                                <button class="btn btn-sm btn-outline-primary"
                                        onclick="showDetails(${card.cardId})">
                                    Подробнее
                                </button>
                            </div>
                        </div>
                    </div>
                `;

                container.appendChild(col);
            });
        })
        .catch(() => alert('Ошибка загрузки карточек'));
}

/* ---------------- ДЕТАЛИ ---------------- */
function showDetails(cardId) {
    fetch(`${apiBase}/${cardId}/details`)
        .then(res => res.ok ? res.json() : Promise.reject())
        .then(data => {
            document.getElementById('detailsModalTitle').innerText = data.title || '';

            let html = `
                <p><strong>Профиль:</strong> ${escapeHtml(data.profile)}</p>
                <p><strong>Кафедра:</strong> ${escapeHtml(data.graduating)}</p>
                <p><strong>Контакты:</strong> ${escapeHtml(data.contacts)}</p>
                <p><strong>Длительность:</strong> ${escapeHtml(data.duration)}</p>
                <hr>
            `;

            if (data.activities?.length) {
                html += `<h6>🎯 Активности:</h6>
                         <ul>${data.activities.map(a => `<li>${escapeHtml(a)}</li>`).join('')}</ul>`;
            }

            if (data.partners?.length) {
                html += `<h6>🤝 Партнёры:</h6>
                         <ul>${data.partners.map(p => `<li>${escapeHtml(p)}</li>`).join('')}</ul>`;
            }

            document.getElementById('detailsModalBody').innerHTML = html;

            new bootstrap.Modal(document.getElementById('detailsModal')).show();
        })
        .catch(() => alert('Ошибка загрузки деталей'));
}

/* ---------------- ЭКРАНИРОВАНИЕ ---------------- */
function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m =>
        m === '&' ? '&amp;' :
        m === '<' ? '&lt;' :
        '&gt;'
    );
}

/* ---------------- ИНИЦИАЛИЗАЦИЯ ---------------- */
document.addEventListener('DOMContentLoaded', () => {
    loadCardsList();

    const createBtn = document.getElementById('openCreateModal');
    if (createBtn) {
        createBtn.onclick = () => loadForm('/admin/create-form');
    }
});
</script>щт
</div>
</th:block>
</html>

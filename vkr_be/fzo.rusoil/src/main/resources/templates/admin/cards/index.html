<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<th:block th:with="title='Карточки'">

<div th:fragment="content">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<div class="container mt-5">
    <div class="d-flex justify-content-between mb-4">
        <h1>📚 Образовательные программы</h1>
        <button class="btn btn-primary" id="openCreateModal">➕ Создать</button>
    </div>

    <div class="row" id="cardsContainer"></div>
</div>

<div class="modal fade" id="formModal">
    <div class="modal-dialog modal-xl">
        <div class="modal-content" id="formModalContent"></div>
    </div>
</div>

<script>
const apiBase = '/api/cards';

/* ========================= */
function loadCardsList() {
    fetch(apiBase)
    .then(r => r.json())
    .then(cards => {

        const container = document.getElementById('cardsContainer');
        container.innerHTML = '';

        cards.forEach(card => {
            container.innerHTML += `
                <div class="col-md-4 mb-3">
                    <div class="card p-3">

                        ${card.img ? `<img src="${card.img}" style="width:100%;height:200px;object-fit:cover;">` : ''}

                        <h5>${card.title}</h5>

                        <button onclick="editCard(${card.cardId})">✏</button>
                        <button onclick="deleteCard(${card.cardId})">🗑</button>
                    </div>
                </div>
            `;
        });

    });
}

/* ========================= */
function loadForm(url, id=null) {
    fetch(url)
    .then(r => r.text())
    .then(html => {

        document.getElementById('formModalContent').innerHTML = html;

        const modal = new bootstrap.Modal(document.getElementById('formModal'));
        modal.show();

        setTimeout(() => {

            bindForm();

            if (id) {
                fetch(`/api/cards/${id}/details`)
                .then(r => r.json())
                .then(fillForm);
            }

        }, 50);
    });
}

/* ========================= */
function bindForm() {

    const form = document.getElementById('cardForm');

    const fileInput = document.getElementById('imageInput');
    const preview = document.getElementById('previewImage');

    if (fileInput) {
        fileInput.onchange = () => {
            const file = fileInput.files[0];
            if (!file) return;

            preview.src = URL.createObjectURL(file);
            preview.style.display = 'block';
        };
    }

    form.onsubmit = async (e) => {
        e.preventDefault();

        let img = null;

        if (fileInput && fileInput.files.length > 0) {
            img = await uploadImage(fileInput.files[0]);
        }

        const data = {
            cardId: form.cardId.value || null,
            title: form.title.value,
            profile: form.profile.value,
            graduating: form.graduating.value,
            contacts: form.contacts.value,
            duration: form.duration.value,
            additionalTitle: form.additionalTitle.value,
            additionalInfo: form.additionalInfo.value,
            img: img
        };

        fetch('/api/cards/save', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify(data)
        })
        .then(() => {
            bootstrap.Modal.getInstance(document.getElementById('formModal')).hide();
            loadCardsList();
        });
    };
}

/* ========================= */
function fillForm(data) {

    const form = document.getElementById('cardForm');

    form.cardId.value = data.cardId || '';
    form.title.value = data.title || '';
    form.profile.value = data.profile || '';
    form.graduating.value = data.graduating || '';
    form.contacts.value = data.contacts || '';
    form.duration.value = data.duration || '';
    form.additionalTitle.value = data.additionalTitle || '';
    form.additionalInfo.value = data.additionalInfo || '';

    if (data.img) {
        const preview = document.getElementById('previewImage');
        preview.src = data.img;
        preview.style.display = 'block';
    }
}

/* ========================= */
function editCard(id) {
    loadForm('/admin/create-form', id);
}

/* ========================= */
function deleteCard(id) {
    fetch(`/api/cards/${id}`, {method:'DELETE'})
    .then(loadCardsList);
}

/* ========================= */
async function uploadImage(file) {

    const fd = new FormData();
    fd.append("file", file);

    const res = await fetch('/api/cards/upload-image', {
        method:'POST',
        body: fd
    });

    return await res.text();
}

/* ========================= */
document.addEventListener('DOMContentLoaded', () => {

    document.getElementById('openCreateModal').onclick =
        () => loadForm('/admin/create-form');

    loadCardsList();
});
</script>

</div>
</th:block>
</html>

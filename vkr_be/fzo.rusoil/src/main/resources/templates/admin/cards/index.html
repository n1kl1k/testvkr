<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<th:block th:with="title='Карточки'">

<div th:fragment="content">

<!-- head переносим сюда -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<style>
    .card-hover:hover {
        transform: translateY(-5px);
        transition: 0.3s;
        box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        cursor: pointer;
    }
    .card { border-radius: 20px; overflow: hidden; }
    .badge-custom {
        background-color: #0d6efd;
        color: white;
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 12px;
    }
    .btn-edit {
        background-color: #ffc107;
        border: none;
    }
    .btn-edit:hover {
        background-color: #e0a800;
    }
    .modal-body {
        max-height: 70vh;
        overflow-y: auto;
    }
</style>

<!-- ТВОЙ HTML БЕЗ ИЗМЕНЕНИЙ -->
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>📚 Образовательные программы</h1>
        <button type="button" class="btn btn-primary" id="openCreateModal">➕ Создать карточку</button>
    </div>
    <div class="row" id="cardsContainer"></div>
</div>

<!-- МОДАЛКИ БЕЗ ИЗМЕНЕНИЙ -->
<div class="modal fade" id="detailsModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="detailsModalTitle"></h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="detailsModalBody"></div>
        </div>
    </div>
</div>

<div class="modal fade" id="formModal" tabindex="-1" data-bs-backdrop="static">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
        <div class="modal-content" id="formModalContent"></div>
    </div>
</div>

<script>
const apiBase = '/api/cards';

/* =========================
   HTML escape
========================= */
function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m =>
        m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'
    );
}

/* =========================
   Загрузка карточек
========================= */
function loadCardsList() {
    fetch(apiBase)
        .then(res => res.json())
        .then(cards => {
            const container = document.getElementById('cardsContainer');
            container.innerHTML = '';

            cards.forEach(card => {
                const col = document.createElement('div');
                col.className = 'col-md-6 col-lg-4 mb-4';

                col.innerHTML = `
                <div class="card h-100 card-hover">
                    ${card.img ? `<img src="${card.img}" class="card-img-top" style="height:200px;object-fit:cover;">` : ''}
                    <div class="card-body">
                        <h5>${escapeHtml(card.title)}</h5>
                        <p>${escapeHtml(card.profile)}</p>
                        <small>${escapeHtml(card.duration)}</small>

                        <div class="mt-3 d-flex justify-content-between">
                            <button class="btn btn-sm btn-outline-primary"
                                onclick="showDetails(${card.cardId})">
                                Подробнее
                            </button>

                            <div>
                                <button class="btn btn-sm btn-warning"
                                    onclick="editCard(${card.cardId})">✏</button>

                                <button class="btn btn-sm btn-danger"
                                    onclick="deleteCard(${card.cardId})">🗑</button>
                            </div>
                        </div>
                    </div>
                </div>
                `;
                container.appendChild(col);
            });
        });
}

/* =========================
   Детали
========================= */
function showDetails(id) {
    fetch(`${apiBase}/${id}/details`)
        .then(res => res.json())
        .then(data => {
            document.getElementById('detailsModalTitle').innerText = data.title;

            document.getElementById('detailsModalBody').innerHTML = `
                ${data.img ? `<img src="${data.img}" style="width:100%;margin-bottom:10px;">` : ''}
                <p><b>Профиль:</b> ${escapeHtml(data.profile)}</p>
                <p><b>Кафедра:</b> ${escapeHtml(data.graduating)}</p>
                <p><b>Контакты:</b> ${escapeHtml(data.contacts)}</p>
                <p><b>Срок:</b> ${escapeHtml(data.duration)}</p>
            `;

            new bootstrap.Modal(document.getElementById('detailsModal')).show();
        });
}

/* =========================
   Открытие формы
========================= */
function loadForm(url, id = null) {
    fetch(url)
        .then(res => res.text())
        .then(html => {
            document.getElementById('formModalContent').innerHTML = html;

            const modal = new bootstrap.Modal(document.getElementById('formModal'));
            modal.show();

            setTimeout(() => {

                // ✅ безопасный onchange
                const fileInput = document.getElementById('imageInput');
                if (fileInput) {
                    fileInput.addEventListener('change', function () {
                        const file = this.files[0];
                        if (!file) return;

                        const preview = document.getElementById('previewImage');
                        preview.src = URL.createObjectURL(file);
                        preview.style.display = 'block';
                    });
                }

                bindFormSubmit();
                bindDynamicFields();

                // ✅ загрузка данных при редактировании
                if (id) {
                    fetch(`${apiBase}/${id}/details`)
                        .then(res => res.json())
                        .then(fillForm);
                }

            }, 50);
        });
}

/* =========================
   INIT
========================= */
document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('openCreateModal').onclick = () => {
        loadForm('/admin/create-form');
    };
    loadCardsList();
});

/* =========================
   SUBMIT
========================= */
function bindFormSubmit() {
    const form = document.getElementById('cardForm');

    form.onsubmit = async function (e) {
        e.preventDefault();

        const fileInput = document.getElementById('imageInput');
        let img = null;

        if (fileInput && fileInput.files.length > 0) {
            img = await uploadImage(fileInput.files[0]);
        }

        const data = {
            cardId: form.querySelector('[name="cardId"]').value || null,
            title: form.querySelector('[name="title"]').value,
            profile: form.querySelector('[name="profile"]').value,
            graduating: form.querySelector('[name="graduating"]').value,
            contacts: form.querySelector('[name="contacts"]').value,
            duration: form.querySelector('[name="duration"]').value,
            additionalTitle: form.querySelector('[name="additionalTitle"]').value,
            additionalInfo: form.querySelector('[name="additionalInfo"]').value,
            img: img,

            activities: [...form.querySelectorAll('[name="activities"]')].map(i => i.value),
            partners: [...form.querySelectorAll('[name="partners"]')].map(i => i.value),

            requirements: [...form.querySelectorAll('.requirements-container .row')].map(row => ({
                basePlan: row.querySelector('[name="requirementsBasePlan"]').value,
                spoPlan: row.querySelector('[name="requirementsSpoPlan"]').value
            })),

            plans: [...form.querySelectorAll('.plans-container .row')].map(row => ({
                budget: row.querySelector('[name="planBudget"]').value,
                paid: row.querySelector('[name="planPaid"]').value,
                score: row.querySelector('[name="planScore"]').value
            }))
        };

        fetch(`${apiBase}/save`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        })
        .then(res => {
            if (!res.ok) throw new Error();
            alert('Сохранено');
            bootstrap.Modal.getInstance(document.getElementById('formModal')).hide();
            loadCardsList();
        })
        .catch(() => alert('Ошибка'));
    };
}

/* =========================
   EDIT / DELETE
========================= */
function editCard(id) {
    loadForm('/admin/create-form', id);
}

function deleteCard(id) {
    if (!confirm('Удалить карточку?')) return;

    fetch(`${apiBase}/${id}`, { method: 'DELETE' })
        .then(() => {
            alert('Удалено');
            loadCardsList();
        });
}

/* =========================
   FILL FORM
========================= */
function fillForm(data) {
    const form = document.getElementById('cardForm');

    form.querySelector('[name="cardId"]').value = data.cardId || '';
    form.querySelector('[name="title"]').value = data.title || '';
    form.querySelector('[name="profile"]').value = data.profile || '';
    form.querySelector('[name="graduating"]').value = data.graduating || '';
    form.querySelector('[name="contacts"]').value = data.contacts || '';
    form.querySelector('[name="duration"]').value = data.duration || '';

    if (data.img) {
        const preview = document.getElementById('previewImage');
        preview.src = data.img;
        preview.style.display = 'block';
    }
}

/* =========================
   UPLOAD
========================= */
async function uploadImage(file) {
    const formData = new FormData();
    formData.append("file", file);

    const res = await fetch(`${apiBase}/upload-image`, {
        method: 'POST',
        body: formData
    });

    return await res.text();
}
</script>
</div>
</th:block>
</html>

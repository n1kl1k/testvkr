services:
  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_DB: fzo_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-net

  backend:
    build:
      context: ./vkr_be
    container_name: spring_backend
    restart: always
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/fzo_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    networks:
      - app-net

  frontend:
  build:
    context: ./fzo/fzo
  container_name: react_frontend
  restart: always
  volumes:
    - frontend_build:/app/dist
  networks:
    - app-net

nginx:
  image: nginx:alpine
  container_name: nginx_proxy
  ports:
    - "80:80"
  volumes:
    - frontend_build:/usr/share/nginx/html
    - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
  depends_on:
    - frontend
    - backend
  networks:
    - app-net

networks:
  app-net:

volumes:
  postgres_data: